services:
  postgres:
    # См. Dockerfile: зеркало library/* без docker.io (macOS credential helper).
    image: public.ecr.aws/docker/library/postgres:16-alpine
    environment:
      POSTGRES_DB: codequest
      POSTGRES_USER: codequest
      POSTGRES_PASSWORD: codequest
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codequest -d codequest"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "${HOST_APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/codequest
      SPRING_DATASOURCE_USERNAME: codequest
      SPRING_DATASOURCE_PASSWORD: codequest
      APP_CODE_EXECUTION_FALLBACK_LOCAL_GCC: "false"
      APP_CODE_EXECUTION_DOCKER_IMAGE: public.ecr.aws/docker/library/gcc:14-bookworm
      APP_CODE_EXECUTION_DOCKER_SANDBOX_VOLUME: codequest_sandbox_data
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - codequest_sandbox_data:/cq-sandbox
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  codequest_sandbox_data:
    name: codequest_sandbox_data
