<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeQuest — Войти в игру</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #080c18;
            --surface: #0f1629;
            --border: #1a2744;
            --cyan: #00e5ff;
            --orange: #ff6b2b;
            --purple: #a855f7;
            --green: #22c55e;
            --text: #c8d6e5;
            --text-dim: #5a6e8a;
            --pixel: 'Press Start 2P', monospace;
            --mono: 'JetBrains Mono', monospace;
        }

        body {
            font-family: var(--mono);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridScroll 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridScroll {
            to { transform: translate(40px, 40px); }
        }

        /* floating particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particles span {
            position: absolute;
            width: 2px; height: 2px;
            background: var(--cyan);
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }
        @keyframes float {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 420px;
            max-width: 95vw;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-family: var(--pixel);
            font-size: 28px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            margin-bottom: 8px;
        }
        .logo .subtitle {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .ascii-art {
            text-align: center;
            font-size: 10px;
            line-height: 1.3;
            color: var(--cyan);
            opacity: 0.4;
            margin-bottom: 24px;
            white-space: pre;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--cyan), var(--purple), var(--orange));
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--text-dim);
            font-family: var(--pixel);
            font-size: 10px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .tab-btn.active {
            color: var(--cyan);
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0; right: 0;
            height: 2px;
            background: var(--cyan);
            box-shadow: 0 0 10px var(--cyan);
        }
        .tab-btn:hover { color: var(--text); }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px rgba(0,229,255,.1);
        }
        .form-group input::placeholder {
            color: var(--text-dim);
            opacity: 0.5;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-family: var(--pixel);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--cyan), #0099cc);
            color: var(--bg);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,229,255,.3);
        }
        .btn-primary:active {
            transform: translateY(0);
        }

        .error-msg {
            background: rgba(239,68,68,.1);
            border: 1px solid rgba(239,68,68,.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #f87171;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.visible { display: block; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .version-tag {
            text-align: center;
            margin-top: 20px;
            font-size: 10px;
            color: var(--text-dim);
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="login-container">
        <div class="logo">
            <h1>&lt;CodeQuest/&gt;</h1>
            <div class="subtitle">learn C. level up. conquer.</div>
        </div>

        <div class="ascii-art">
    ╔══════════════════════════════╗
    ║  ⚔  CHOOSE YOUR PATH  ⚔    ║
    ╚══════════════════════════════╝</div>

        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">Войти</button>
                <button class="tab-btn" data-tab="register">Регистрация</button>
            </div>

            <div id="error" class="error-msg"></div>

            <!-- Login -->
            <div class="tab-content active" id="tab-login">
                <form id="loginForm">
                    <div class="form-group">
                        <label>Имя героя</label>
                        <input type="text" name="username" placeholder="adventurer" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary">⚔ Начать приключение</button>
                </form>
            </div>

            <!-- Register -->
            <div class="tab-content" id="tab-register">
                <form id="registerForm">
                    <div class="form-group">
                        <label>Имя героя</label>
                        <input type="text" name="username" placeholder="adventurer" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="hero@quest.dev" autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" name="password" placeholder="••••••••" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary">✦ Создать персонажа</button>
                </form>
            </div>
        </div>

        <div class="version-tag">v1.0 — Spring 2026</div>
    </div>

    <script>
        // redirect if already logged in
        if (localStorage.getItem('cq_token')) {
            window.location.href = '/app.html';
        }

        // particles
        const particlesEl = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const s = document.createElement('span');
            s.style.left = Math.random() * 100 + '%';
            s.style.animationDuration = (4 + Math.random() * 8) + 's';
            s.style.animationDelay = Math.random() * 6 + 's';
            s.style.width = s.style.height = (1 + Math.random() * 2) + 'px';
            particlesEl.appendChild(s);
        }

        // tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
                hideError();
            });
        });

        const errorEl = document.getElementById('error');
        function showError(msg) { errorEl.textContent = msg; errorEl.classList.add('visible'); }
        function hideError() { errorEl.classList.remove('visible'); }

        async function authRequest(endpoint, body) {
            hideError();
            try {
                const res = await fetch('/api/auth/' + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Ошибка');
                localStorage.setItem('cq_token', data.token);
                localStorage.setItem('cq_user', data.username);
                localStorage.setItem('cq_role', data.role);
                window.location.href = '/app.html';
            } catch (e) {
                showError(e.message);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', e => {
            e.preventDefault();
            const f = new FormData(e.target);
            authRequest('login', { username: f.get('username'), password: f.get('password') });
        });

        document.getElementById('registerForm').addEventListener('submit', e => {
            e.preventDefault();
            const f = new FormData(e.target);
            authRequest('register', {
                username: f.get('username'),
                email: f.get('email'),
                password: f.get('password')
            });
        });
    </script>
</body>
</html>
