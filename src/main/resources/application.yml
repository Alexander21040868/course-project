spring:
  application:
    name: codequest

  # H2 для локальной разработки; замените на PostgreSQL для прода
  datasource:
    url: jdbc:h2:file:./data/codequest;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: Y29kZXF1ZXN0LXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLTIwMjQ=
    expiration-ms: 86400000

  # Проверка решений: gcc в Docker (Docker Desktop должен быть запущен).
  # Полный путь к CLI, если в терминале нет docker: переменная APP_CODE_EXECUTION_DOCKER_PATH
  # или скрипт scripts/codequest-run.sh (добавляет Docker.app в PATH на macOS).
  code-execution:
    enabled: true
    docker-image: gcc:14-bookworm
    docker-path: ${APP_CODE_EXECUTION_DOCKER_PATH:docker}
    wall-timeout-ms: 45000
    run-timeout-sec: 5
    # true: если Docker не запущен, проверка идёт через локальный gcc (только для доверенной среды)
    fallback-local-gcc: true

---
spring:
  config:
    activate:
      on-profile: postgres

  datasource:
    url: jdbc:postgresql://localhost:5432/codequest
    driver-class-name: org.postgresql.Driver
    username: codequest
    password: codequest

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    locations: classpath:db/migration
