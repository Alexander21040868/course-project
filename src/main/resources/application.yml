spring:
  application:
    name: codequest

  datasource:
    url: jdbc:h2:file:./data/codequest;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: Y29kZXF1ZXN0LXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLTIwMjQ=
    expiration-ms: 86400000

  code-execution:
    enabled: true
    docker-image: public.ecr.aws/docker/library/gcc:14-bookworm
    docker-path: ${APP_CODE_EXECUTION_DOCKER_PATH:docker}
    wall-timeout-ms: 45000
    run-timeout-sec: 5
    fallback-local-gcc: true

---
spring:
  config:
    activate:
      on-profile: postgres

  datasource:
    url: jdbc:postgresql://localhost:5432/codequest
    driver-class-name: org.postgresql.Driver
    username: codequest
    password: codequest

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  flyway:
    locations: classpath:db/migration_postgresql
